services:
  app:
    image: ${VIRALODEREGAL_IMAGE:-ghcr.io/tobihagemann/viraloderegal:latest}
    env_file: .env
    environment:
      NODE_ENV: production
    # Both sides parameterized so a PORT override keeps the host mapping on the container's actual port.
    # TLS is terminated by the reverse proxy (Traefik) in front of this.
    ports:
      - '127.0.0.1:${HOST_PORT:-3000}:${PORT:-3000}'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Derive the port from $PORT (default 3000) and hit /health without adding curl/wget.
      test:
        [
          'CMD',
          'node',
          '-e',
          "const p=process.env.PORT||3000;fetch('http://localhost:'+p+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: UTC
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg-data:
