services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: viraloderegal
      POSTGRES_PASSWORD: viraloderegal
      POSTGRES_DB: viraloderegal
      TZ: UTC
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U viraloderegal -d viraloderegal']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg-data:
